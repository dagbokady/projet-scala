db {
  url      = "jdbc:postgresql://localhost:5432/gestion_universite"
  user     = "postgres"
  password = "postgres"
  driver   = "org.postgresql.Driver"
  pool {
    maxSize = 10
    minIdle = 2
  }
}

server {
  host = "0.0.0.0"
  port = 8080
}

akka {
  loglevel = "INFO"
  http {
    server {
      idle-timeout = 60s
    }
  }
}
